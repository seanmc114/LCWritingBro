    {en:"Not a single day goes by without me thinking about our wonderful trip to Salamanca",tl:"No pasa un solo día sin que piense en nuestro maravilloso viaje a Salamanca",lv:9},
    {en:"Whatever happens in the future I know that our friendship will always last",tl:"Pase lo que pase en el futuro sé que nuestra amistad siempre durará",lv:9},
    {en:"Not only have you been a wonderful friend but you have also been an inspiration to me",tl:"No solo has sido un amigo maravilloso sino que también has sido una inspiración para mí",lv:9},
    {en:"Looking forward to the day when we can finally meet again after all this time",tl:"Esperando con ilusión el día en que por fin podamos vernos de nuevo después de tanto tiempo",lv:10},
    {en:"Were it not for your friendship I am not sure I would have got through this year",tl:"Si no fuera por tu amistad no estoy seguro de que hubiera podido superar este año",lv:10},
    {en:"It goes without saying that you will always have a place in my home and my heart",tl:"No hace falta decir que siempre tendrás un lugar en mi casa y en mi corazón",lv:10},
    {en:"Not until I was far from home did I truly understand the value of real friendship",tl:"No fue hasta que estuve lejos de casa cuando entendí de verdad el valor de la amistad verdadera",lv:10},
  ],
  opinion: [
    {en:"In my opinion young people spend far too much time on their phones",tl:"En mi opinión los jóvenes pasan demasiado tiempo con el móvil",lv:1},
    {en:"I think that sport is very important for both physical and mental health",tl:"Creo que el deporte es muy importante para la salud física y mental",lv:1},
    {en:"I believe that music has the power to bring people together",tl:"Pienso que la música tiene el poder de unir a las personas",lv:1},
    {en:"First of all I would like to point out that this is a very complex issue",tl:"En primer lugar me gustaría señalar que este es un tema muy complejo",lv:1},
    {en:"On the other hand many people argue that technology has improved our lives",tl:"Por otro lado muchas personas argumentan que la tecnología ha mejorado nuestras vidas",lv:1},
    {en:"For example in Spain young people often spend their evenings outdoors with friends",tl:"Por ejemplo en España los jóvenes a menudo pasan las tardes al aire libre con amigos",lv:2},
    {en:"However it is important to remember that not everyone has the same opportunities",tl:"Sin embargo es importante recordar que no todo el mundo tiene las mismas oportunidades",lv:2},
    {en:"As a result of social media many teenagers feel under enormous pressure",tl:"Como resultado de las redes sociales muchos adolescentes se sienten bajo una enorme presión",lv:2},
    {en:"Although I understand this point of view I respectfully disagree with it",tl:"Aunque entiendo este punto de vista no estoy de acuerdo con él",lv:2},
    {en:"It cannot be denied that social media has completely changed the way we communicate",tl:"No se puede negar que las redes sociales han cambiado completamente la manera en que nos comunicamos",lv:2},
    {en:"Furthermore recent studies have clearly shown that exercise improves concentration",tl:"Además estudios recientes han demostrado claramente que el ejercicio mejora la concentración",lv:3},
    {en:"In conclusion I firmly believe that we all have a personal responsibility",tl:"En conclusión creo firmemente que todos tenemos una responsabilidad personal",lv:3},
    {en:"To sum up I think that education is the key to solving most of our problems",tl:"En resumen creo que la educación es la clave para resolver la mayoría de nuestros problemas",lv:3},
    {en:"On balance I believe that the advantages clearly outweigh the disadvantages",tl:"En general creo que las ventajas superan claramente a las desventajas",lv:3},
    {en:"I would argue that young people today face challenges that previous generations never had",tl:"Yo diría que los jóvenes de hoy se enfrentan a desafíos que las generaciones anteriores nunca tuvieron",lv:3},
    {en:"If governments invested more in education the results for society would be far better",tl:"Si los gobiernos invirtieran más en educación los resultados para la sociedad serían mucho mejores",lv:4},
    {en:"In the future technology will play an even greater role in all of our daily lives",tl:"En el futuro la tecnología desempeñará un papel aún mayor en toda nuestra vida cotidiana",lv:4},
    {en:"Without doubt this serious problem will get much worse if we do absolutely nothing",tl:"Sin duda este grave problema empeorará mucho si no hacemos absolutamente nada",lv:4},
    {en:"There can be no doubt whatsoever that young people today deserve far more support",tl:"No cabe la menor duda de que los jóvenes de hoy merecen mucho más apoyo",lv:4},
    {en:"I personally believe that every child has the right to a quality education",tl:"Personalmente creo que todo niño tiene derecho a una educación de calidad",lv:4},
    {en:"Were we to take this issue more seriously as a society things would definitely improve",tl:"Si tomáramos este tema más en serio como sociedad las cosas mejorarían definitivamente",lv:5},
    {en:"It would be a serious mistake to continue ignoring the devastating impact of climate change",tl:"Sería un grave error seguir ignorando el devastador impacto del cambio climático",lv:5},
    {en:"This change would not only benefit individuals but also the whole of society",tl:"Este cambio no solo beneficiaría a los individuos sino también a toda la sociedad",lv:5},
    {en:"If we all made small changes in our daily lives the overall impact would be enormous",tl:"Si todos hiciéramos pequeños cambios en nuestra vida diaria el impacto global sería enorme",lv:5},
    {en:"I am absolutely convinced that future generations will judge us by the decisions we make today",tl:"Estoy absolutamente convencido de que las generaciones futuras nos juzgarán por las decisiones que tomemos hoy",lv:6},
    {en:"It is my firm belief that sport should be compulsory in every school across the country",tl:"Es mi firme convicción que el deporte debería ser obligatorio en todos los colegios del país",lv:6},
    {en:"We have a collective duty to leave the planet in a better state than we found it",tl:"Tenemos el deber colectivo de dejar el planeta en un estado mejor de como lo encontramos",lv:6},
    {en:"It is absolutely essential that we all act together before it is too late to do so",tl:"Es absolutamente esencial que todos actuemos juntos antes de que sea demasiado tarde para hacerlo",lv:7},
    {en:"It is deeply alarming that so many young people suffer from serious anxiety and depression",tl:"Es profundamente alarmante que tantos jóvenes sufran de ansiedad y depresión graves",lv:7},
    {en:"I strongly recommend that every young person learns at least one foreign language",tl:"Recomiendo encarecidamente que cada joven aprenda al menos un idioma extranjero",lv:7},
    {en:"I propose that all schools dedicate more time each week to mental health and wellbeing",tl:"Propongo que todos los colegios dediquen más tiempo cada semana a la salud mental y el bienestar",lv:7},
    {en:"We simply cannot accept that future generations inherit a planet that we have damaged beyond repair",tl:"Simplemente no podemos aceptar que las generaciones futuras hereden un planeta que hemos dañado irreparablemente",lv:8},
    {en:"It is high time that we as a society stopped placing so much pressure on young people",tl:"Ya es hora de que como sociedad dejemos de ejercer tanta presión sobre los jóvenes",lv:8},
    {en:"It strikes me as deeply unfair that not all children have access to the same opportunities",tl:"Me parece profundamente injusto que no todos los niños tengan acceso a las mismas oportunidades",lv:8},
    {en:"Far from being a problem diversity is in fact one of our greatest collective strengths",tl:"Lejos de ser un problema la diversidad es en realidad una de nuestras mayores fortalezas colectivas",lv:9},
    {en:"The more connected we become digitally the more isolated we seem to feel in real life",tl:"Cuanto más conectados estamos digitalmente más aislados parecemos sentirnos en la vida real",lv:9},
    {en:"Not only must we acknowledge this crisis but we must also take immediate concrete steps to address it",tl:"No solo debemos reconocer esta crisis sino que también debemos tomar medidas concretas e inmediatas para abordarla",lv:9},
    {en:"However much we try to deny it the evidence of climate change is simply overwhelming",tl:"Por mucho que intentemos negarlo la evidencia del cambio climático es sencillamente abrumadora",lv:9},
    {en:"It is high time that society as a whole stopped placing such unbearable pressure on young people",tl:"Ya es hora de que la sociedad en su conjunto deje de ejercer una presión tan insoportable sobre los jóvenes",lv:10},
    {en:"Were we truly committed to change we would have acted with far greater urgency long before now",tl:"Si estuviéramos verdaderamente comprometidos con el cambio habríamos actuado con mucha más urgencia mucho antes de ahora",lv:10},
    {en:"However difficult the road ahead may be I remain convinced that a better future is within our reach",tl:"Por difícil que sea el camino por delante sigo convencido de que un futuro mejor está a nuestro alcance",lv:10},
  ],
  formal: [

    {en:"I expect a prompt and professional response to this serious matter",tl:"Espero una respuesta rápida y profesional a este grave asunto",lv:2},

    {en:"I am writing with regard to the job advertisement that appeared in your newspaper last week",tl:"Me dirijo a usted con respecto al anuncio de trabajo que apareció en su periódico la semana pasada",lv:4},
    {en:"I would like to apply for the position of summer intern that you advertised recently",tl:"Me gustaría solicitar el puesto de becario de verano que anunció recientemente",lv:4},
    {en:"I firmly believe that I have all the skills and qualities required for this position",tl:"Creo firmemente que tengo todas las habilidades y cualidades requeridas para este puesto",lv:4},
    {en:"I would greatly appreciate the opportunity to attend an interview at your convenience",tl:"Agradecería enormemente la oportunidad de acudir a una entrevista cuando usted lo considere oportuno",lv:4},
    {en:"I attach my curriculum vitae and all the supporting documents for your consideration",tl:"Adjunto mi currículum y todos los documentos de apoyo para su consideración",lv:4},
    {en:"Should you require any further information please do not hesitate to contact me at any time",tl:"Si necesita información adicional no dude en ponerse en contacto conmigo en cualquier momento",lv:5},
    {en:"I am available for interview at any time that is convenient for you",tl:"Estoy disponible para una entrevista en cualquier momento que sea conveniente para usted",lv:5},
    {en:"I can assure you that I am an extremely reliable and hardworking person with great enthusiasm",tl:"Le aseguro que soy una persona extremadamente fiable y trabajadora con mucho entusiasmo",lv:5},
    {en:"I would welcome the opportunity to discuss my application with you in more detail",tl:"Me gustaría tener la oportunidad de hablar con usted sobre mi solicitud con más detalle",lv:5},
    {en:"I look forward to hearing from you and to the possibility of working together",tl:"Quedo a la espera de sus noticias y de la posibilidad de trabajar juntos",lv:6},
    {en:"I trust that this matter will be resolved to our mutual satisfaction as soon as possible",tl:"Confío en que este asunto se resolverá para la satisfacción mutua de ambas partes lo antes posible",lv:6},
    {en:"I request that this urgent matter be dealt with as a priority within the next few days",tl:"Solicito que este asunto urgente sea tratado con carácter prioritario en los próximos días",lv:7},
    {en:"It is imperative that your company takes full responsibility for this serious error",tl:"Es imprescindible que su empresa asuma la plena responsabilidad de este grave error",lv:7},
    {en:"I insist that I receive a full written explanation within a maximum of five working days",tl:"Exijo que reciba una explicación completa por escrito en un máximo de cinco días hábiles",lv:7},
    {en:"I trust that you will take all necessary steps to ensure that this does not happen again",tl:"Confío en que tomará todas las medidas necesarias para garantizar que esto no vuelva a ocurrir",lv:7},
    {en:"I feel it is only right and fair that all customers are treated with dignity and respect",tl:"Creo que es justo y correcto que todos los clientes sean tratados con dignidad y respeto",lv:8},
    {en:"I reserve the right to take this matter to the relevant consumer protection authority if necessary",tl:"Me reservo el derecho de llevar este asunto a la autoridad de protección al consumidor si fuera necesario",lv:8},
    {en:"It goes without saying that a company of your reputation should maintain the very highest standards",tl:"No hace falta decir que una empresa de su reputación debería mantener los más altos estándares",lv:8},
    {en:"Having been a loyal and valued customer for many years I find this situation wholly unacceptable",tl:"Siendo cliente leal y valorado desde hace muchos años encuentro esta situación totalmente inaceptable",lv:9},
    {en:"Not only was the service completely unacceptable but the staff were also rude and unhelpful throughout",tl:"No solo fue el servicio completamente inaceptable sino que además el personal fue grosero y poco servicial en todo momento",lv:9},
    {en:"Were your company to address this matter promptly it would go a long way to restoring my confidence",tl:"Si su empresa abordara este asunto con prontitud contribuiría en gran medida a restaurar mi confianza",lv:9},

    {en:"I would strongly urge you to reconsider your position on this matter with the greatest possible urgency",tl:"Le instaria encarecidamente a reconsiderar su postura sobre este asunto con la mayor urgencia posible",lv:10},
    {en:"Were I not to receive a satisfactory resolution I would have no alternative but to pursue this matter legally",tl:"Si no recibiera una resolución satisfactoria no tendría más alternativa que perseguir este asunto por vía legal",lv:10},

fr: {
  dialogue: [
    {en:"I am seventeen years old and I live in Dublin",tl:"J'ai dix-sept ans et j'habite à Dublin",lv:1},
    {en:"I play football at the weekend with my friends",tl:"Je joue au foot le week-end avec mes amis",lv:1},
    {en:"I really like music because it relaxes me",tl:"J'aime beaucoup la musique parce qu'elle me détend",lv:1},
    {en:"I go to school in the city centre by bus",tl:"Je vais au lycée en bus dans le centre-ville",lv:1},
    {en:"I have two brothers and one sister at home",tl:"J'ai deux frères et une sœur à la maison",lv:1},
    {en:"I get on very well with my parents and my sister",tl:"Je m'entends très bien avec mes parents et ma sœur",lv:1},
    {en:"My favourite subject is French because it is really interesting",tl:"Ma matière préférée est le français parce que c'est vraiment intéressant",lv:1},
    {en:"At the weekend I usually go out with my friends",tl:"Le week-end je sors généralement avec mes amis",lv:1},
    {en:"I went to the cinema with my friends last Saturday",tl:"Je suis allé au cinéma avec mes amis samedi dernier",lv:2},
    {en:"The film was brilliant and I really enjoyed it",tl:"Le film était génial et je l'ai vraiment adoré",lv:2},
    {en:"Yesterday I felt very nervous before the French exam",tl:"Hier je me suis senti très nerveux avant l'examen de français",lv:2},
    {en:"Last summer I went on holiday with my family to France",tl:"L'été dernier je suis parti en vacances avec ma famille en France",lv:2},
    {en:"We stayed in a beautiful hotel near the beach",tl:"Nous avons logé dans un bel hôtel près de la plage",lv:2},
    {en:"I had a great time because the weather was fantastic",tl:"Je me suis bien amusé parce que le temps était fantastique",lv:2},
    {en:"I get on well with my family because we spend a lot of time together",tl:"Je m'entends bien avec ma famille parce que nous passons beaucoup de temps ensemble",lv:3},
    {en:"I think French is important because it is spoken all over the world",tl:"Je pense que le français est important parce qu'on le parle partout dans le monde",lv:3},
    {en:"At the weekend I went to a concert with my best friend",tl:"Le week-end je suis allé à un concert avec mon meilleur ami",lv:3},
    {en:"I have been studying French for four years and I love it",tl:"J'étudie le français depuis quatre ans et je l'adore",lv:3},
    {en:"My school is quite big and has about eight hundred students",tl:"Mon lycée est assez grand et compte environ huit cents élèves",lv:3},
    {en:"I find maths difficult but I work hard to improve",tl:"Je trouve les maths difficiles mais je travaille dur pour progresser",lv:3},
    {en:"After the Leaving Cert I will go to university to study medicine",tl:"Après le Leaving Cert j'irai à l'université pour étudier la médecine",lv:4},
    {en:"I think French will be very useful for my future career",tl:"Je pense que le français sera très utile pour ma future carrière",lv:4},
    {en:"I would love to visit France because I adore the culture",tl:"J'adorerais visiter la France parce que j'adore la culture",lv:4},
    {en:"If I had more free time I would learn to play the guitar",tl:"Si j'avais plus de temps libre j'apprendrais à jouer de la guitare",lv:4},
    {en:"In the future I would like to travel around Europe",tl:"À l'avenir j'aimerais voyager à travers l'Europe",lv:4},
    {en:"I think I will live abroad for a few years after university",tl:"Je pense que je vivrai à l'étranger pendant quelques années après l'université",lv:5},
    {en:"If I won the lottery I would travel around the whole world",tl:"Si je gagnais à la loterie je ferais le tour du monde",lv:5},
    {en:"I would change the school day because it is far too long",tl:"Je changerais la journée scolaire parce qu'elle est beaucoup trop longue",lv:5},
    {en:"I will continue studying French because it opens so many doors",tl:"Je continuerai à étudier le français parce que cela ouvre tellement de portes",lv:6},
    {en:"In ten years I hope to be working as a doctor in a hospital",tl:"Dans dix ans j'espère travailler comme médecin dans un hôpital",lv:6},
    {en:"If I could change one thing about my school I would start later",tl:"Si je pouvais changer une chose dans mon lycée je commencerais plus tard",lv:6},
    {en:"I would move to Paris because the lifestyle there is amazing",tl:"Je déménagerais à Paris parce que le style de vie là-bas est incroyable",lv:6},
    {en:"I hope that the exam goes well because I have worked very hard",tl:"J'espère que l'examen se passe bien parce que j'ai travaillé très dur",lv:7},
    {en:"It surprises me that so many people do not speak a second language",tl:"Ça m'étonne que tant de gens ne parlent pas une deuxième langue",lv:7},
    {en:"My teacher recommends that we practise every day to improve",tl:"Mon professeur recommande qu'on s'entraîne tous les jours pour progresser",lv:7},
    {en:"I am delighted that you are coming to visit Ireland next summer",tl:"Je suis ravi que tu viennes visiter l'Irlande l'été prochain",lv:7},
    {en:"It worries me that young people spend so much time on screens",tl:"Ça m'inquiète que les jeunes passent autant de temps devant les écrans",lv:7},
    {en:"It bothers me that there is so much pollution in our cities",tl:"Ça me dérange qu'il y ait autant de pollution dans nos villes",lv:8},
    {en:"It seems vital to me that young people learn about the environment",tl:"Il me semble vital que les jeunes apprennent à connaître l'environnement",lv:8},
    {en:"I am glad that we have had the chance to talk today",tl:"Je suis content que nous ayons eu l'occasion de parler aujourd'hui",lv:8},
    {en:"It fascinates me that French is spoken in so many countries",tl:"Ça me fascine que le français soit parlé dans autant de pays",lv:8},
    {en:"I find it hard to believe that the exam is so close now",tl:"J'ai du mal à croire que l'examen soit si proche maintenant",lv:8},
    {en:"Not only do I love sport but I also think it is essential for mental health",tl:"Non seulement j'adore le sport mais je pense aussi qu'il est essentiel pour la santé mentale",lv:9},
    {en:"Although I find exams stressful I understand that they are necessary",tl:"Bien que je trouve les examens stressants je comprends qu'ils sont nécessaires",lv:9},
    {en:"If I had studied harder last year I would have got much better results",tl:"Si j'avais travaillé plus dur l'année dernière j'aurais obtenu de bien meilleurs résultats",lv:9},
    {en:"The more I practise French the more confident I feel when I speak",tl:"Plus je pratique le français plus je me sens confiant quand je parle",lv:9},
    {en:"It is a pity that so many young people are under such enormous pressure",tl:"C'est dommage que tant de jeunes soient soumis à une telle pression",lv:9},
    {en:"Having lived in Dublin all my life I would love to experience another culture",tl:"Ayant vécu à Dublin toute ma vie j'adorerais découvrir une autre culture",lv:10},
    {en:"Not only have I improved my French this year but I have also grown in confidence",tl:"Non seulement j'ai amélioré mon français cette année mais j'ai aussi gagné en confiance",lv:10},
    {en:"The harder I work the more I realise how much I still have to learn",tl:"Plus je travaille dur plus je réalise combien il me reste encore à apprendre",lv:10},
    {en:"Were it not for my teacher I would never have discovered my love of languages",tl:"Sans mon professeur je n'aurais jamais découvert mon amour pour les langues",lv:10},
    {en:"However difficult the exam may be I am determined to give my very best",tl:"Aussi difficile que soit l'examen je suis déterminé à donner le meilleur de moi-même",lv:10},

    {en:"I promised myself that I would exercise every day to reduce stress",tl:"Je me suis promis que je ferais de l'exercice tous les jours pour réduire le stress",lv:5},
    {en:"I would go to bed earlier if I did not have so much homework",tl:"Je me coucherais plus tôt si je n'avais pas autant de travail",lv:6},
    {en:"Next year I will have more freedom to choose what I study",tl:"L'année prochaine j'aurai plus de liberté pour choisir ce que j'étudie",lv:6},
    {en:"It makes me happy that my parents always support me no matter what",tl:"Ça me rend heureux que mes parents me soutiennent toujours quoi qu'il arrive",lv:7},
    {en:"I hope that tomorrow will be a much better day than today",tl:"J'espère que demain sera une bien meilleure journée qu'aujourd'hui",lv:7},
    {en:"It frustrates me that I cannot find enough time to relax properly",tl:"Ça me frustre que je ne puisse pas trouver assez de temps pour vraiment me détendre",lv:7},
    {en:"My parents want me to do my absolute best in all my exams",tl:"Mes parents veulent que je fasse de mon mieux dans tous mes examens",lv:7},
    {en:"It seems incredible to me that the whole school year has passed so quickly",tl:"Ça me semble incroyable que toute l'année scolaire soit passée si vite",lv:8},
    {en:"I doubt that anyone will remember this difficult year in ten years time",tl:"Je doute que quelqu'un se souvienne de cette année difficile dans dix ans",lv:8},
    {en:"I am glad that my friends are always there when I need them most",tl:"Je suis content que mes amis soient toujours là quand j'en ai le plus besoin",lv:8},
    {en:"Despite the enormous pressure I have tried to maintain a positive attitude throughout",tl:"Malgré l'énorme pression j'ai essayé de garder une attitude positive tout au long de l'année",lv:9},
    {en:"Reflecting on the year I realise how much I have grown as a person",tl:"En réfléchissant à l'année je réalise combien j'ai grandi en tant que personne",lv:9},
    {en:"Not only have I worked harder than ever but I have also learned a great deal about myself",tl:"Non seulement j'ai travaillé plus dur que jamais mais j'ai aussi beaucoup appris sur moi-même",lv:9},
    {en:"Were it not for my friends this year would have been far more difficult to get through",tl:"Sans mes amis cette année aurait été bien plus difficile à traverser",lv:9},
    {en:"Looking back on everything I would not change a single thing about this year",tl:"En repensant à tout je ne changerais absolument rien à cette année",lv:10},
    {en:"However hard the journey has been I am proud of everything I have achieved",tl:"Si difficile qu'ait été le chemin je suis fier de tout ce que j'ai accompli",lv:10},
    {en:"The more I reflect on this year the more grateful I feel for the people around me",tl:"Plus je réfléchis à cette année plus je me sens reconnaissant envers les gens qui m'entourent",lv:10},
    {en:"If I had known at the start how much I would learn I would not have been so afraid",tl:"Si j'avais su au début combien j'allais apprendre je n'aurais pas eu si peur",lv:10},
  ],
  note: [
    {en:"I am writing to tell you some really exciting news",tl:"Je t'écris pour te donner de très bonnes nouvelles",lv:1},
    {en:"Thank you so much for your lovely letter last week",tl:"Merci beaucoup pour ta belle lettre la semaine dernière",lv:1},
    {en:"I am sorry I did not reply sooner but I have been very busy",tl:"Je suis désolé de ne pas avoir répondu plus tôt mais j'ai été très occupé",lv:1},
    {en:"I hope that you and your whole family are keeping well",tl:"J'espère que toi et toute ta famille vous portez bien",lv:1},
    {en:"I have been very busy with school and all my exams lately",tl:"J'ai été très occupé avec le lycée et tous mes examens ces derniers temps",lv:1},
    {en:"My family and I went on holiday to France last summer",tl:"Ma famille et moi sommes partis en vacances en France l'été dernier",lv:2},
    {en:"We stayed in a small but lovely hotel very close to the beach",tl:"Nous avons séjourné dans un petit hôtel charmant très près de la plage",lv:2},
    {en:"We had a wonderful time because the weather was absolutely perfect",tl:"Nous avons passé un merveilleux moment parce que le temps était absolument parfait",lv:2},
    {en:"It would be great if we could meet up during the summer holidays",tl:"Ce serait super si on pouvait se retrouver pendant les grandes vacances",lv:2},
    {en:"Give my warmest regards to your family from all of us",tl:"Transmets nos meilleures amitiés à toute ta famille de notre part",lv:3},
    {en:"I cannot wait to see you again when you come to Ireland",tl:"Je suis impatient de te revoir quand tu viendras en Irlande",lv:3},
    {en:"I really enjoyed your last letter and I read it twice",tl:"J'ai vraiment apprécié ta dernière lettre et je l'ai lue deux fois",lv:3},
    {en:"I wanted to let you know that I will arrive on Friday evening",tl:"Je voulais te faire savoir que j'arriverai vendredi soir",lv:4},
    {en:"I would like to ask you a really important favour if that is okay",tl:"J'aimerais te demander un service vraiment important si tu es d'accord",lv:4},
    {en:"I am writing to tell you about our exciting plans for the summer",tl:"Je t'écris pour te parler de nos projets passionnants pour l'été",lv:4},
    {en:"I was wondering if you would like to come and visit Ireland this summer",tl:"Je me demandais si tu aimerais venir visiter l'Irlande cet été",lv:4},
    {en:"If you come to visit in July the weather will probably be much better",tl:"Si tu viens nous rendre visite en juillet le temps sera probablement bien meilleur",lv:5},
    {en:"I would be absolutely delighted if you could come to stay with us",tl:"Je serais absolument ravi si tu pouvais venir séjourner chez nous",lv:5},
    {en:"I think you would love Dublin because there is so much to see and do",tl:"Je pense que tu adorerais Dublin parce qu'il y a tellement à voir et à faire",lv:5},
    {en:"We would have such a brilliant time together exploring the city",tl:"On passerait tellement de bons moments ensemble à explorer la ville",lv:5},
    {en:"I would be so grateful if you could send me information about the course",tl:"Je te serais vraiment reconnaissant si tu pouvais m'envoyer des informations sur le cours",lv:6},
    {en:"I can assure you that I will make the most of this opportunity",tl:"Je t'assure que je profiterai au maximum de cette opportunité",lv:6},
    {en:"I am so glad that you managed to pass all your exams this year",tl:"Je suis tellement content que tu aies réussi à passer tous tes examens cette année",lv:7},
    {en:"It is such a shame that you cannot come to the party next week",tl:"C'est vraiment dommage que tu ne puisses pas venir à la fête la semaine prochaine",lv:7},
    {en:"My mother insists that you stay for dinner whenever you come to visit us",tl:"Ma mère insiste pour que tu restes dîner chaque fois que tu viens nous rendre visite",lv:7},
    {en:"I suggest that we meet in the city centre on Saturday morning",tl:"Je propose qu'on se retrouve dans le centre-ville samedi matin",lv:7},
    {en:"It moves me so much that you remembered my birthday after all this time",tl:"Ça me touche tellement que tu te souviennes de mon anniversaire après tout ce temps",lv:8},
    {en:"I recommend that you book your flights as early as possible to get a good price",tl:"Je te recommande de réserver tes vols le plus tôt possible pour avoir un bon prix",lv:8},
    {en:"I am delighted that you have decided to study French at university next year",tl:"Je suis ravi que tu aies décidé d'étudier le français à l'université l'année prochaine",lv:8},
    {en:"Although we have not seen each other for a very long time I often think of you",tl:"Bien que nous ne nous soyons pas vus depuis très longtemps je pense souvent à toi",lv:9},
    {en:"Not a single day goes by without me thinking about our wonderful trip to Paris",tl:"Il ne se passe pas un seul jour sans que je pense à notre merveilleux voyage à Paris",lv:9},
    {en:"Whatever happens in the future I know that our friendship will always last",tl:"Quoi qu'il arrive à l'avenir je sais que notre amitié durera toujours",lv:9},
    {en:"Not only have you been a wonderful friend but you have also been an inspiration to me",tl:"Non seulement tu as été un ami merveilleux mais tu as aussi été une source d'inspiration pour moi",lv:9},
    {en:"Looking forward to the day when we can finally meet again after all this time",tl:"J'attends avec impatience le jour où nous pourrons enfin nous revoir après tout ce temps",lv:10},
    {en:"Were it not for your friendship I am not sure I would have got through this year",tl:"Sans ton amitié je ne suis pas sûr que j'aurais pu traverser cette année",lv:10},
    {en:"It goes without saying that you will always have a place in my home and my heart",tl:"Il va sans dire que tu auras toujours une place dans ma maison et dans mon cœur",lv:10},
    {en:"Not until I was far from home did I truly understand the value of real friendship",tl:"C'est seulement quand j'étais loin de chez moi que j'ai vraiment compris la valeur de la véritable amitié",lv:10},
  ],
  opinion: [
    {en:"In my opinion young people spend far too much time on their phones",tl:"À mon avis les jeunes passent beaucoup trop de temps sur leur téléphone",lv:1},
    {en:"I think that sport is very important for both physical and mental health",tl:"Je pense que le sport est très important pour la santé physique et mentale",lv:1},
    {en:"I believe that music has the power to bring people together",tl:"Je crois que la musique a le pouvoir de rassembler les gens",lv:1},
    {en:"First of all I would like to point out that this is a very complex issue",tl:"Tout d'abord je voudrais souligner qu'il s'agit d'un sujet très complexe",lv:1},
    {en:"On the other hand many people argue that technology has improved our lives",tl:"D'un autre côté beaucoup de gens affirment que la technologie a amélioré nos vies",lv:1},
    {en:"For example in France young people often spend their evenings outdoors with friends",tl:"Par exemple en France les jeunes passent souvent leurs soirées dehors avec des amis",lv:2},
    {en:"However it is important to remember that not everyone has the same opportunities",tl:"Cependant il est important de rappeler que tout le monde n'a pas les mêmes opportunités",lv:2},
    {en:"As a result of social media many teenagers feel under enormous pressure",tl:"À cause des réseaux sociaux beaucoup d'adolescents se sentent sous une pression énorme",lv:2},
    {en:"Although I understand this point of view I respectfully disagree with it",tl:"Bien que je comprenne ce point de vue je ne suis pas d'accord avec lui",lv:2},
    {en:"It cannot be denied that social media has completely changed the way we communicate",tl:"On ne peut pas nier que les réseaux sociaux ont complètement changé notre façon de communiquer",lv:2},
    {en:"Furthermore recent studies have clearly shown that exercise improves concentration",tl:"De plus des études récentes ont clairement montré que l'exercice améliore la concentration",lv:3},
    {en:"In conclusion I firmly believe that we all have a personal responsibility",tl:"En conclusion je crois fermement que nous avons tous une responsabilité personnelle",lv:3},
    {en:"To sum up I think that education is the key to solving most of our problems",tl:"En résumé je pense que l'éducation est la clé pour résoudre la plupart de nos problèmes",lv:3},
    {en:"On balance I believe that the advantages clearly outweigh the disadvantages",tl:"Dans l'ensemble je crois que les avantages l'emportent clairement sur les inconvénients",lv:3},
    {en:"I would argue that young people today face challenges that previous generations never had",tl:"Je dirais que les jeunes d'aujourd'hui font face à des défis que les générations précédentes n'ont jamais connus",lv:3},
    {en:"If governments invested more in education the results for society would be far better",tl:"Si les gouvernements investissaient davantage dans l'éducation les résultats pour la société seraient bien meilleurs",lv:4},
    {en:"In the future technology will play an even greater role in all of our daily lives",tl:"À l'avenir la technologie jouera un rôle encore plus important dans notre vie quotidienne",lv:4},
    {en:"Without doubt this serious problem will get much worse if we do absolutely nothing",tl:"Sans aucun doute ce grave problème s'aggravera beaucoup si nous ne faisons absolument rien",lv:4},
    {en:"There can be no doubt whatsoever that young people today deserve far more support",tl:"Il ne fait aucun doute que les jeunes d'aujourd'hui méritent beaucoup plus de soutien",lv:4},
    {en:"I personally believe that every child has the right to a quality education",tl:"Je crois personnellement que chaque enfant a droit à une éducation de qualité",lv:4},
    {en:"Were we to take this issue more seriously as a society things would definitely improve",tl:"Si nous prenions ce problème plus au sérieux en tant que société les choses s'amélioreraient certainement",lv:5},
    {en:"It would be a serious mistake to continue ignoring the devastating impact of climate change",tl:"Ce serait une grave erreur de continuer à ignorer l'impact dévastateur du changement climatique",lv:5},
    {en:"This change would not only benefit individuals but also the whole of society",tl:"Ce changement ne profiterait pas seulement aux individus mais aussi à toute la société",lv:5},
    {en:"If we all made small changes in our daily lives the overall impact would be enormous",tl:"Si nous faisions tous de petits changements dans notre vie quotidienne l'impact global serait énorme",lv:5},
    {en:"I am absolutely convinced that future generations will judge us by the decisions we make today",tl:"Je suis absolument convaincu que les générations futures nous jugeront selon les décisions que nous prenons aujourd'hui",lv:6},
    {en:"It is my firm belief that sport should be compulsory in every school across the country",tl:"Je crois fermement que le sport devrait être obligatoire dans chaque école du pays",lv:6},
    {en:"We have a collective duty to leave the planet in a better state than we found it",tl:"Nous avons le devoir collectif de laisser la planète dans un meilleur état que celui où nous l'avons trouvée",lv:6},
    {en:"It is absolutely essential that we all act together before it is too late to do so",tl:"Il est absolument essentiel que nous agissions tous ensemble avant qu'il ne soit trop tard",lv:7},
    {en:"It is deeply alarming that so many young people suffer from serious anxiety and depression",tl:"Il est profondément alarmant que tant de jeunes souffrent d'anxiété et de dépression graves",lv:7},
    {en:"I strongly recommend that every young person learns at least one foreign language",tl:"Je recommande vivement que chaque jeune apprenne au moins une langue étrangère",lv:7},
    {en:"I propose that all schools dedicate more time each week to mental health and wellbeing",tl:"Je propose que toutes les écoles consacrent plus de temps chaque semaine à la santé mentale et au bien-être",lv:7},
    {en:"We simply cannot accept that future generations inherit a planet that we have damaged beyond repair",tl:"Nous ne pouvons tout simplement pas accepter que les générations futures héritent d'une planète que nous avons irrémédiablement endommagée",lv:8},
    {en:"It is high time that we as a society stopped placing so much pressure on young people",tl:"Il est grand temps que nous en tant que société cessions d'exercer autant de pression sur les jeunes",lv:8},
    {en:"It strikes me as deeply unfair that not all children have access to the same opportunities",tl:"Il me semble profondément injuste que tous les enfants n'aient pas accès aux mêmes opportunités",lv:8},
    {en:"Far from being a problem diversity is in fact one of our greatest collective strengths",tl:"Loin d'être un problème la diversité est en fait l'une de nos plus grandes forces collectives",lv:9},
    {en:"The more connected we become digitally the more isolated we seem to feel in real life",tl:"Plus nous sommes connectés numériquement plus nous semblons nous sentir isolés dans la vie réelle",lv:9},
    {en:"Not only must we acknowledge this crisis but we must also take immediate concrete steps to address it",tl:"Non seulement nous devons reconnaître cette crise mais nous devons aussi prendre des mesures concrètes immédiates pour y remédier",lv:9},
    {en:"However much we try to deny it the evidence of climate change is simply overwhelming",tl:"Nous avons beau essayer de le nier les preuves du changement climatique sont tout simplement accablantes",lv:9},
    {en:"It is high time that society as a whole stopped placing such unbearable pressure on young people",tl:"Il est grand temps que la société dans son ensemble cesse d'exercer une telle pression insupportable sur les jeunes",lv:10},
    {en:"Were we truly committed to change we would have acted with far greater urgency long before now",tl:"Si nous étions vraiment déterminés à changer nous aurions agi avec bien plus d'urgence bien avant maintenant",lv:10},
    {en:"However difficult the road ahead may be I remain convinced that a better future is within our reach",tl:"Aussi difficile que soit le chemin qui nous attend je reste convaincu qu'un avenir meilleur est à notre portée",lv:10},
  ],
  formal: [
    {en:"I am writing to make a formal complaint about a recent purchase",tl:"Je me permets de vous écrire pour formuler une plainte formelle concernant un achat récent",lv:1},
    {en:"I am writing to request detailed information about your summer courses",tl:"Je vous contacte afin de solliciter des informations détaillées sur vos cours d'été",lv:1},
    {en:"I recently purchased an expensive product in your shop on the high street",tl:"J'ai récemment acheté un article coûteux dans votre boutique de la rue principale",lv:1},
    {en:"I am writing to express my serious concern about the quality of your service",tl:"Je vous écris pour vous faire part de ma vive préoccupation concernant la qualité de votre service",lv:1},
    {en:"Unfortunately the product arrived completely damaged and in an unusable condition",tl:"Malheureusement le produit est arrivé complètement endommagé et dans un état inutilisable",lv:2},
    {en:"I would like to request a full and immediate refund for this defective product",tl:"Je souhaite demander un remboursement complet et immédiat pour ce produit défectueux",lv:2},
    {en:"I am extremely disappointed with the very poor level of service I received",tl:"Je suis extrêmement déçu par le très faible niveau de service que j'ai reçu",lv:2},
    {en:"I expect a prompt and professional response to this serious matter",tl:"J'attends une réponse rapide et professionnelle concernant ce grave problème",lv:2},
    {en:"I would be grateful if you could look into this matter as a priority",tl:"Je vous serais reconnaissant de bien vouloir examiner cette affaire en priorité",lv:2},
    {en:"I look forward to receiving your response within the next five working days",tl:"Dans l'attente de votre réponse sous cinq jours ouvrables",lv:3},
    {en:"Please do not hesitate to contact me if you require any further information",tl:"N'hésitez pas à me contacter si vous avez besoin d'informations supplémentaires",lv:3},
    {en:"I trust that you will deal with this matter swiftly and professionally",tl:"Je fais confiance à ce que vous régliez cette affaire rapidement et professionnellement",lv:3},
    {en:"I remain available to discuss this matter further at your earliest convenience",tl:"Je reste disponible pour discuter de cette affaire plus en détail dès que vous le souhaitez",lv:3},
    {en:"I am writing with regard to the job advertisement that appeared in your newspaper last week",tl:"Je vous écris au sujet de l'offre d'emploi parue dans votre journal la semaine dernière",lv:4},
    {en:"I would like to apply for the position of summer intern that you advertised recently",tl:"Je souhaite postuler au poste de stagiaire d'été que vous avez récemment publié",lv:4},
    {en:"I firmly believe that I have all the skills and qualities required for this position",tl:"Je crois fermement posséder toutes les compétences et qualités requises pour ce poste",lv:4},
    {en:"I would greatly appreciate the opportunity to attend an interview at your convenience",tl:"Je serais très honoré d'avoir l'opportunité de passer un entretien à votre convenance",lv:4},
    {en:"I attach my curriculum vitae and all the supporting documents for your consideration",tl:"Vous trouverez ci-joint mon curriculum vitae ainsi que tous les documents justificatifs",lv:4},
    {en:"Should you require any further information please do not hesitate to contact me at any time",tl:"Si vous avez besoin d'informations supplémentaires n'hésitez pas à me contacter à tout moment",lv:5},
    {en:"I am available for interview at any time that is convenient for you",tl:"Je suis disponible pour un entretien à tout moment qui vous conviendrait",lv:5},
    {en:"I can assure you that I am an extremely reliable and hardworking person with great enthusiasm",tl:"Je peux vous assurer que je suis une personne extrêmement fiable et travailleuse avec beaucoup d'enthousiasme",lv:5},
    {en:"I would welcome the opportunity to discuss my application with you in more detail",tl:"Je serais heureux d'avoir l'occasion de discuter de ma candidature avec vous plus en détail",lv:5},
    {en:"I look forward to hearing from you and to the possibility of working together",tl:"Dans l'espoir de recevoir de vos nouvelles et de la possibilité de travailler ensemble",lv:6},
    {en:"I trust that this matter will be resolved to our mutual satisfaction as soon as possible",tl:"Je fais confiance à ce que cette affaire soit résolue à notre satisfaction mutuelle le plus tôt possible",lv:6},
    {en:"I request that this urgent matter be dealt with as a priority within the next few days",tl:"Je demande que cette affaire urgente soit traitée en priorité dans les prochains jours",lv:7},
    {en:"It is imperative that your company takes full responsibility for this serious error",tl:"Il est impératif que votre entreprise assume l'entière responsabilité de cette grave erreur",lv:7},
    {en:"I insist that I receive a full written explanation within a maximum of five working days",tl:"J'exige de recevoir une explication écrite complète dans un délai maximum de cinq jours ouvrables",lv:7},
    {en:"I trust that you will take all necessary steps to ensure that this does not happen again",tl:"Je compte sur vous pour prendre toutes les mesures nécessaires afin que cela ne se reproduise pas",lv:7},
    {en:"I feel it is only right and fair that all customers are treated with dignity and respect",tl:"Il me semble juste et équitable que tous les clients soient traités avec dignité et respect",lv:8},
    {en:"I reserve the right to take this matter to the relevant consumer protection authority if necessary",tl:"Je me réserve le droit de soumettre cette affaire à l'autorité compétente de protection des consommateurs si nécessaire",lv:8},
    {en:"It goes without saying that a company of your reputation should maintain the very highest standards",tl:"Il va sans dire qu'une entreprise de votre réputation devrait maintenir les plus hauts standards",lv:8},
    {en:"Having been a loyal and valued customer for many years I find this situation wholly unacceptable",tl:"En tant que client fidèle et apprécié depuis de nombreuses années je trouve cette situation totalement inacceptable",lv:9},
    {en:"Not only was the service completely unacceptable but the staff were also rude and unhelpful throughout",tl:"Non seulement le service était totalement inacceptable mais le personnel s'est également montré impoli et peu serviable",lv:9},
    {en:"Were your company to address this matter promptly it would go a long way to restoring my confidence",tl:"Si votre entreprise traitait cette affaire rapidement cela contribuerait grandement à rétablir ma confiance",lv:9},
    {en:"It goes without saying that a company of your long standing should uphold the very highest standards at all times",tl:"Il va sans dire qu'une entreprise de votre longue tradition devrait maintenir les plus hauts standards en tout temps",lv:10},
    {en:"I would strongly urge you to reconsider your position on this matter with the greatest possible urgency",tl:"Je vous encourage vivement à reconsidérer votre position sur cette affaire avec la plus grande urgence possible",lv:10},
    {en:"Were I not to receive a satisfactory resolution I would have no alternative but to pursue this matter legally",tl:"Si je ne recevais pas une résolution satisfaisante je n'aurais d'autre choix que de poursuivre cette affaire par voie judiciaire",lv:10},
  ],
},

de: {
  dialogue: [
    {en:"I am seventeen years old and I live in Dublin",tl:"Ich bin siebzehn Jahre alt und wohne in Dublin",lv:1},
    {en:"I play football at the weekend with my friends",tl:"Ich spiele am Wochenende mit meinen Freunden Fußball",lv:1},
    {en:"I really like music because it relaxes me",tl:"Ich mag Musik sehr gern weil sie mich entspannt",lv:1},
    {en:"I go to school in the city centre by bus",tl:"Ich fahre mit dem Bus zur Schule ins Stadtzentrum",lv:1},
    {en:"I have two brothers and one sister at home",tl:"Ich habe zwei Brüder und eine Schwester zu Hause",lv:1},
    {en:"I get on very well with my parents and my sister",tl:"Ich verstehe mich sehr gut mit meinen Eltern und meiner Schwester",lv:1},
    {en:"My favourite subject is German because it is really interesting",tl:"Mein Lieblingsfach ist Deutsch weil es wirklich interessant ist",lv:1},
    {en:"At the weekend I usually go out with my friends",tl:"Am Wochenende gehe ich normalerweise mit meinen Freunden aus",lv:1},
    {en:"I went to the cinema with my friends last Saturday",tl:"Ich bin letzten Samstag mit meinen Freunden ins Kino gegangen",lv:2},
    {en:"The film was brilliant and I really enjoyed it",tl:"Der Film war toll und ich habe ihn wirklich genossen",lv:2},
    {en:"Yesterday I felt very nervous before the German exam",tl:"Gestern war ich sehr nervös vor der Deutschprüfung",lv:2},
    {en:"Last summer I went on holiday with my family to Germany",tl:"Letzten Sommer bin ich mit meiner Familie nach Deutschland in den Urlaub gefahren",lv:2},
    {en:"We stayed in a beautiful hotel near the beach",tl:"Wir haben in einem wunderschönen Hotel in der Nähe des Strandes gewohnt",lv:2},
    {en:"I had a great time because the weather was fantastic",tl:"Ich hatte eine tolle Zeit weil das Wetter fantastisch war",lv:2},
    {en:"I get on well with my family because we spend a lot of time together",tl:"Ich verstehe mich gut mit meiner Familie weil wir viel Zeit miteinander verbringen",lv:3},
    {en:"I think German is important because it is spoken all over Europe",tl:"Ich denke dass Deutsch wichtig ist weil es in ganz Europa gesprochen wird",lv:3},
    {en:"At the weekend I went to a concert with my best friend",tl:"Am Wochenende bin ich mit meinem besten Freund zu einem Konzert gegangen",lv:3},
    {en:"I have been studying German for four years and I love it",tl:"Ich lerne seit vier Jahren Deutsch und ich liebe es",lv:3},
    {en:"My school is quite big and has about eight hundred students",tl:"Meine Schule ist ziemlich groß und hat ungefähr achthundert Schüler",lv:3},
    {en:"I find maths difficult but I work hard to improve",tl:"Ich finde Mathe schwierig aber ich arbeite hart um mich zu verbessern",lv:3},
    {en:"After the Leaving Cert I will go to university to study medicine",tl:"Nach dem Leaving Cert werde ich an die Universität gehen um Medizin zu studieren",lv:4},
    {en:"I think German will be very useful for my future career",tl:"Ich denke dass Deutsch für meine zukünftige Karriere sehr nützlich sein wird",lv:4},
    {en:"I would love to visit Germany because I adore the culture",tl:"Ich würde Deutschland gerne besuchen weil ich die Kultur so toll finde",lv:4},
    {en:"If I had more free time I would learn to play the guitar",tl:"Wenn ich mehr Freizeit hätte würde ich Gitarre spielen lernen",lv:4},
    {en:"In the future I would like to travel around Europe",tl:"In der Zukunft würde ich gerne durch Europa reisen",lv:4},

    {en:"I would change the school day because it is far too long",tl:"Ich würde den Schultag ändern weil er viel zu lang ist",lv:5},

    {en:"In ten years I hope to be working as a doctor in a hospital",tl:"In zehn Jahren hoffe ich als Arzt in einem Krankenhaus zu arbeiten",lv:6},
    {en:"If I could change one thing about my school I would start later",tl:"Wenn ich eine Sache an meiner Schule ändern könnte würde ich später anfangen",lv:6},
    {en:"I would move to Berlin because the lifestyle there is amazing",tl:"Ich würde nach Berlin ziehen weil der Lebensstil dort unglaublich ist",lv:6},
    {en:"I hope that the exam goes well because I have worked very hard",tl:"Ich hoffe dass die Prüfung gut läuft weil ich sehr hart gearbeitet habe",lv:7},
    {en:"It surprises me that so many people do not speak a second language",tl:"Es überrascht mich dass so viele Menschen keine zweite Sprache sprechen",lv:7},
    {en:"My teacher recommends that we practise every day to improve",tl:"Meine Lehrerin empfiehlt dass wir jeden Tag üben um uns zu verbessern",lv:7},
    {en:"I am delighted that you are coming to visit Ireland next summer",tl:"Ich freue mich sehr dass du nächsten Sommer Irland besuchen kommst",lv:7},
    {en:"It worries me that young people spend so much time on screens",tl:"Es besorgt mich dass junge Menschen so viel Zeit vor Bildschirmen verbringen",lv:7},
    {en:"It bothers me that there is so much pollution in our cities",tl:"Es stört mich dass es in unseren Städten so viel Umweltverschmutzung gibt",lv:8},
    {en:"It seems vital to me that young people learn about the environment",tl:"Es scheint mir wichtig zu sein dass junge Menschen über die Umwelt lernen",lv:8},
    {en:"I am glad that we have had the chance to talk today",tl:"Ich bin froh dass wir heute die Möglichkeit hatten zu reden",lv:8},
    {en:"It fascinates me that German is spoken in so many countries",tl:"Es fasziniert mich dass Deutsch in so vielen Ländern gesprochen wird",lv:8},
    {en:"I find it hard to believe that the exam is so close now",tl:"Ich kann kaum glauben dass die Prüfung jetzt so nah ist",lv:8},
    {en:"Not only do I love sport but I also think it is essential for mental health",tl:"Ich liebe Sport nicht nur sondern ich denke auch dass er für die psychische Gesundheit unerlässlich ist",lv:9},
    {en:"Although I find exams stressful I understand that they are necessary",tl:"Obwohl ich Prüfungen stressig finde verstehe ich dass sie notwendig sind",lv:9},
    {en:"If I had studied harder last year I would have got much better results",tl:"Wenn ich letztes Jahr fleißiger gelernt hätte hätte ich viel bessere Ergebnisse erzielt",lv:9},
    {en:"The more I practise German the more confident I feel when I speak",tl:"Je mehr ich Deutsch übe desto selbstbewusster fühle ich mich wenn ich spreche",lv:9},
    {en:"It is a pity that so many young people are under such enormous pressure",tl:"Es ist schade dass so viele junge Menschen unter einem so enormen Druck stehen",lv:9},

  diary: [
    {en:"This morning I got up early and had breakfast with my family",tl:"Heute Morgen bin ich früh aufgestanden und habe mit meiner Familie gefrühstückt",lv:1},
    {en:"I went to school by bus because it was raining heavily",tl:"Ich bin mit dem Bus zur Schule gefahren weil es stark geregnet hat",lv:1},
    {en:"After school I did my homework in my bedroom",tl:"Nach der Schule habe ich meine Hausaufgaben in meinem Zimmer gemacht",lv:1},
    {en:"Today was a really difficult day at school",tl:"Heute war ein wirklich schwieriger Tag in der Schule",lv:1},
    {en:"In the evening I watched television with my family",tl:"Am Abend habe ich mit meiner Familie ferngesehen",lv:1},
    {en:"Last night I watched a brilliant film with my friends",tl:"Gestern Abend habe ich mit meinen Freunden einen tollen Film gesehen",lv:2},
    {en:"Yesterday I felt very nervous before the maths exam",tl:"Gestern war ich sehr nervös vor der Mathematikprüfung",lv:2},
    {en:"After the exam I felt relieved because it went well",tl:"Nach der Prüfung war ich erleichtert weil es gut gelaufen ist",lv:2},
    {en:"I spent the whole afternoon studying in the library",tl:"Ich habe den ganzen Nachmittag in der Bibliothek gelernt",lv:2},
    {en:"My mother cooked a delicious dinner and we ate together",tl:"Meine Mutter hat ein köstliches Abendessen gekocht und wir haben zusammen gegessen",lv:2},
    {en:"I had an argument with my best friend because of a misunderstanding",tl:"Ich habe mich wegen eines Missverständnisses mit meinem besten Freund gestritten",lv:3},
    {en:"Fortunately we made up in the evening and apologised to each other",tl:"Zum Glück haben wir uns am Abend versöhnt und uns gegenseitig entschuldigt",lv:3},
    {en:"I spent the whole day studying because the exams are next week",tl:"Ich habe den ganzen Tag gelernt weil die Prüfungen nächste Woche sind",lv:3},
    {en:"Today was a great day because I got excellent results in my test",tl:"Heute war ein toller Tag weil ich ausgezeichnete Ergebnisse bei meinem Test erzielt habe",lv:3},
    {en:"I went to a party at the weekend and had an incredible time",tl:"Ich bin am Wochenende zu einer Party gegangen und hatte eine unglaubliche Zeit",lv:3},
    {en:"Tomorrow I will have to get up at six to catch the train",tl:"Morgen werde ich um sechs Uhr aufstehen müssen um den Zug zu erwischen",lv:4},
    {en:"Next week I will start preparing seriously for the oral exam",tl:"Nächste Woche werde ich ernsthaft mit der Vorbereitung auf die mündliche Prüfung beginnen",lv:4},
    {en:"I told myself that I would study more and waste less time",tl:"Ich habe mir gesagt dass ich mehr lernen und weniger Zeit verschwenden würde",lv:4},
    {en:"Next month everything will change after the Leaving Cert is over",tl:"Nächsten Monat wird sich alles ändern nachdem das Leaving Cert vorbei ist",lv:4},
    {en:"I decided that I would spend less time on social media from now on",tl:"Ich habe entschieden dass ich ab jetzt weniger Zeit in sozialen Medien verbringen würde",lv:4},
    {en:"I will have to be much more organised if I want to do well",tl:"Ich werde viel organisierter sein müssen wenn ich gut abschneiden will",lv:5},
    {en:"I promised myself that I would exercise every day to reduce stress",tl:"Ich habe mir versprochen dass ich jeden Tag Sport machen würde um Stress abzubauen",lv:5},
    {en:"I would go to bed earlier if I did not have so much homework",tl:"Ich würde früher schlafen gehen wenn ich nicht so viele Hausaufgaben hätte",lv:6},
    {en:"Next year I will have more freedom to choose what I study",tl:"Nächstes Jahr werde ich mehr Freiheit haben zu wählen was ich studiere",lv:6},
    {en:"It makes me happy that my parents always support me no matter what",tl:"Es macht mich glücklich dass meine Eltern mich immer unterstützen egal was passiert",lv:7},
    {en:"I hope that tomorrow will be a much better day than today",tl:"Ich hoffe dass morgen ein viel besserer Tag als heute sein wird",lv:7},
    {en:"It frustrates me that I cannot find enough time to relax properly",tl:"Es frustriert mich dass ich keine Zeit finde um mich richtig zu entspannen",lv:7},
    {en:"My parents want me to do my absolute best in all my exams",tl:"Meine Eltern wollen dass ich bei allen meinen Prüfungen mein Bestes gebe",lv:7},
    {en:"It seems incredible to me that the whole school year has passed so quickly",tl:"Es erscheint mir unglaublich dass das ganze Schuljahr so schnell vergangen ist",lv:8},
    {en:"I doubt that anyone will remember this difficult year in ten years time",tl:"Ich bezweifle dass sich jemand in zehn Jahren an dieses schwierige Jahr erinnern wird",lv:8},
    {en:"I am glad that my friends are always there when I need them most",tl:"Ich bin froh dass meine Freunde immer da sind wenn ich sie am meisten brauche",lv:8},
    {en:"Despite the enormous pressure I have tried to maintain a positive attitude throughout",tl:"Trotz des enormen Drucks habe ich versucht die ganze Zeit eine positive Einstellung beizubehalten",lv:9},
    {en:"Reflecting on the year I realise how much I have grown as a person",tl:"Wenn ich auf das Jahr zurückblicke merke ich wie sehr ich als Person gewachsen bin",lv:9},
    {en:"Not only have I worked harder than ever but I have also learned a great deal about myself",tl:"Nicht nur habe ich härter gearbeitet als je zuvor sondern ich habe auch sehr viel über mich selbst gelernt",lv:9},
    {en:"Were it not for my friends this year would have been far more difficult to get through",tl:"Ohne meine Freunde wäre dieses Jahr viel schwieriger zu überstehen gewesen",lv:9},
    {en:"Looking back on everything I would not change a single thing about this year",tl:"Wenn ich auf alles zurückblicke würde ich absolut nichts an diesem Jahr ändern",lv:10},
    {en:"However hard the journey has been I am proud of everything I have achieved",tl:"So schwer der Weg auch war ich bin stolz auf alles was ich erreicht habe",lv:10},
    {en:"The more I reflect on this year the more grateful I feel for the people around me",tl:"Je mehr ich über dieses Jahr nachdenke desto dankbarer bin ich für die Menschen um mich herum",lv:10},
    {en:"If I had known at the start how much I would learn I would not have been so afraid",tl:"Wenn ich am Anfang gewusst hätte wie viel ich lernen würde hätte ich keine solche Angst gehabt",lv:10},

  opinion: [
    {en:"In my opinion young people spend far too much time on their phones",tl:"Meiner Meinung nach verbringen junge Menschen viel zu viel Zeit mit ihrem Handy",lv:1},
    {en:"I think that sport is very important for both physical and mental health",tl:"Ich denke dass Sport sehr wichtig für die körperliche und geistige Gesundheit ist",lv:1},
    {en:"I believe that music has the power to bring people together",tl:"Ich glaube dass Musik die Kraft hat Menschen zusammenzubringen",lv:1},
    {en:"First of all I would like to point out that this is a very complex issue",tl:"Zunächst möchte ich darauf hinweisen dass es sich um ein sehr komplexes Thema handelt",lv:1},
    {en:"On the other hand many people argue that technology has improved our lives",tl:"Andererseits argumentieren viele Menschen dass die Technologie unser Leben verbessert hat",lv:1},
    {en:"For example in Germany young people often spend their evenings outdoors with friends",tl:"Zum Beispiel verbringen junge Menschen in Deutschland oft ihre Abende draußen mit Freunden",lv:2},
    {en:"However it is important to remember that not everyone has the same opportunities",tl:"Es ist jedoch wichtig daran zu erinnern dass nicht jeder die gleichen Möglichkeiten hat",lv:2},
    {en:"As a result of social media many teenagers feel under enormous pressure",tl:"Infolge der sozialen Medien fühlen sich viele Teenager unter enormem Druck",lv:2},
    {en:"Although I understand this point of view I respectfully disagree with it",tl:"Obwohl ich diesen Standpunkt verstehe bin ich respektvoll anderer Meinung",lv:2},
    {en:"It cannot be denied that social media has completely changed the way we communicate",tl:"Es lässt sich nicht leugnen dass soziale Medien unsere Kommunikation völlig verändert haben",lv:2},
    {en:"Furthermore recent studies have clearly shown that exercise improves concentration",tl:"Darüber hinaus haben aktuelle Studien klar gezeigt dass Sport die Konzentration verbessert",lv:3},
    {en:"In conclusion I firmly believe that we all have a personal responsibility",tl:"Abschließend bin ich fest davon überzeugt dass wir alle eine persönliche Verantwortung tragen",lv:3},
    {en:"To sum up I think that education is the key to solving most of our problems",tl:"Zusammenfassend denke ich dass Bildung der Schlüssel zur Lösung der meisten unserer Probleme ist",lv:3},
    {en:"On balance I believe that the advantages clearly outweigh the disadvantages",tl:"Insgesamt glaube ich dass die Vorteile die Nachteile deutlich überwiegen",lv:3},
    {en:"I would argue that young people today face challenges that previous generations never had",tl:"Ich würde sagen dass junge Menschen heute Herausforderungen begegnen die frühere Generationen nie kannten",lv:3},
    {en:"If governments invested more in education the results for society would be far better",tl:"Wenn Regierungen mehr in Bildung investierten wären die Ergebnisse für die Gesellschaft viel besser",lv:4},
    {en:"In the future technology will play an even greater role in all of our daily lives",tl:"In der Zukunft wird Technologie eine noch größere Rolle in unserem alltäglichen Leben spielen",lv:4},
    {en:"Without doubt this serious problem will get much worse if we do absolutely nothing",tl:"Ohne Zweifel wird sich dieses ernste Problem viel verschlimmern wenn wir absolut nichts tun",lv:4},
    {en:"There can be no doubt whatsoever that young people today deserve far more support",tl:"Es kann keinerlei Zweifel daran geben dass junge Menschen heute viel mehr Unterstützung verdienen",lv:4},
    {en:"I personally believe that every child has the right to a quality education",tl:"Ich persönlich glaube dass jedes Kind ein Recht auf eine qualitativ hochwertige Bildung hat",lv:4},
    {en:"Were we to take this issue more seriously as a society things would definitely improve",tl:"Wenn wir dieses Thema als Gesellschaft ernster nehmen würden würden sich die Dinge sicher verbessern",lv:5},
    {en:"It would be a serious mistake to continue ignoring the devastating impact of climate change",tl:"Es wäre ein schwerer Fehler den verheerenden Einfluss des Klimawandels weiterhin zu ignorieren",lv:5},
    {en:"This change would not only benefit individuals but also the whole of society",tl:"Diese Veränderung würde nicht nur Einzelpersonen sondern auch der gesamten Gesellschaft nützen",lv:5},
    {en:"If we all made small changes in our daily lives the overall impact would be enormous",tl:"Wenn wir alle kleine Veränderungen in unserem Alltag vornehmen würden wäre der Gesamteffekt enorm",lv:5},
    {en:"I am absolutely convinced that future generations will judge us by the decisions we make today",tl:"Ich bin absolut überzeugt dass künftige Generationen uns nach den Entscheidungen beurteilen werden die wir heute treffen",lv:6},
    {en:"It is my firm belief that sport should be compulsory in every school across the country",tl:"Ich bin fest davon überzeugt dass Sport in jeder Schule des Landes Pflicht sein sollte",lv:6},
    {en:"We have a collective duty to leave the planet in a better state than we found it",tl:"Wir haben die kollektive Pflicht den Planeten in einem besseren Zustand zu hinterlassen als wir ihn vorgefunden haben",lv:6},
    {en:"It is absolutely essential that we all act together before it is too late to do so",tl:"Es ist absolut notwendig dass wir alle gemeinsam handeln bevor es zu spät ist",lv:7},
    {en:"It is deeply alarming that so many young people suffer from serious anxiety and depression",tl:"Es ist zutiefst beunruhigend dass so viele junge Menschen unter schwerer Angst und Depression leiden",lv:7},
    {en:"I strongly recommend that every young person learns at least one foreign language",tl:"Ich empfehle dringend dass jeder junge Mensch mindestens eine Fremdsprache lernt",lv:7},
    {en:"I propose that all schools dedicate more time each week to mental health and wellbeing",tl:"Ich schlage vor dass alle Schulen jede Woche mehr Zeit der psychischen Gesundheit und dem Wohlbefinden widmen",lv:7},
    {en:"We simply cannot accept that future generations inherit a planet that we have damaged beyond repair",tl:"Wir können einfach nicht akzeptieren dass künftige Generationen einen Planeten erben den wir irreparabel beschädigt haben",lv:8},
    {en:"It is high time that we as a society stopped placing so much pressure on young people",tl:"Es wird höchste Zeit dass wir als Gesellschaft aufhören so viel Druck auf junge Menschen auszuüben",lv:8},
    {en:"It strikes me as deeply unfair that not all children have access to the same opportunities",tl:"Es erscheint mir zutiefst ungerecht dass nicht alle Kinder Zugang zu denselben Möglichkeiten haben",lv:8},
    {en:"Far from being a problem diversity is in fact one of our greatest collective strengths",tl:"Weit davon entfernt ein Problem zu sein ist Vielfalt in Wirklichkeit eine unserer größten kollektiven Stärken",lv:9},
    {en:"The more connected we become digitally the more isolated we seem to feel in real life",tl:"Je vernetzter wir digital werden desto isolierter scheinen wir uns im echten Leben zu fühlen",lv:9},
    {en:"Not only must we acknowledge this crisis but we must also take immediate concrete steps to address it",tl:"Nicht nur müssen wir diese Krise anerkennen sondern wir müssen auch sofortige konkrete Schritte unternehmen um sie anzugehen",lv:9},
    {en:"However much we try to deny it the evidence of climate change is simply overwhelming",tl:"So sehr wir es auch zu leugnen versuchen die Beweise für den Klimawandel sind einfach überwältigend",lv:9},
    {en:"It is high time that society as a whole stopped placing such unbearable pressure on young people",tl:"Es ist höchste Zeit dass die Gesellschaft als Ganzes aufhört einen so unerträglichen Druck auf junge Menschen auszuüben",lv:10},
    {en:"Were we truly committed to change we would have acted with far greater urgency long before now",tl:"Wenn wir wirklich zum Wandel entschlossen wären hätten wir schon viel früher mit weit größerer Dringlichkeit gehandelt",lv:10},
    {en:"However difficult the road ahead may be I remain convinced that a better future is within our reach",tl:"So schwierig der Weg vor uns auch sein mag ich bleibe davon überzeugt dass eine bessere Zukunft in unserer Reichweite liegt",lv:10},
