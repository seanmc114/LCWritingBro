// ============================================================
// GAME STATE
// ============================================================
const BROTHER_UNLOCK    = 5;
const PENALTY_SECS      = 20;
const QUESTIONS_PER_LEVEL = 6;

var currentLang = 'es';
var currentCat  = 'dialogue';
var currentLevel = 1;
var currentPhrases = [];
var startTime, timerInterval;

const levelList          = document.getElementById('level-list');
const gameContainer      = document.getElementById('game');
const questionsContainer = document.getElementById('questions');
const resultsContainer   = document.getElementById('results');

// ============================================================
// STORAGE — keyed by language
// ============================================================
function storageKey(suffix) { return 'lc_turbo_' + currentLang + '_' + suffix; }
function getUnlocked()            { return parseInt(localStorage.getItem(storageKey('unlocked')) || '1'); }
function setUnlocked(level)       { if (level > getUnlocked()) localStorage.setItem(storageKey('unlocked'), level); }
function getBest(cat, level)      { return localStorage.getItem(storageKey('best_' + cat + '_' + level)); }
function setBest(cat, level, stars) {
  const prev = parseInt(getBest(cat, level) || '0');
  if (stars > prev) localStorage.setItem(storageKey('best_' + cat + '_' + level), stars);
}
function getTotalStars() {
  let total = 0;
  ['dialogue','diary','note','opinion','formal'].forEach(function(c) {
    for (var v = 1; v <= 10; v++) total += parseInt(getBest(c, v) || '0');
  });
  return total;
}
function brotherUnlocked() { return getTotalStars() >= BROTHER_UNLOCK; }

function getTurboData() {
  const cats = ['dialogue','diary','note','opinion','formal'];
  const catLabels = { dialogue:'Dialogue', diary:'Diary', note:'Note/Email', opinion:'Opinion Piece', formal:'Formal Letter' };
  const data = {};
  cats.forEach(function(cat) {
    data[cat] = { label: catLabels[cat], levels: {} };
    for (var lv = 1; lv <= 10; lv++) {
      const s = getBest(cat, lv);
      if (s) data[cat].levels[lv] = parseInt(s);
    }
  });
  return data;
}

// ============================================================
// LANGUAGE SELECTOR
// ============================================================
const LANG_NAMES = { es: 'Spanish', fr: 'French', de: 'German' };
const LANG_SUBTITLES = {
  es: 'Leaving Cert Spanish · Section C · Written Production',
  fr: 'Leaving Cert French · Section C · Written Production',
  de: 'Leaving Cert German · Section C · Written Production',
};
const VOICE_LANGS = { es: 'es-ES', fr: 'fr-FR', de: 'de-DE' };
const ACCENT_TIPS = {
  es: '💡 For 3 stars: include accents (á é í ó ú ñ) and exact punctuation.',
  fr: '💡 For 3 stars: include accents (é è ê à â ù û î ï ç œ) and exact punctuation.',
  de: '💡 For 3 stars: include umlauts (ä ö ü ß) and exact punctuation.',
};

function selectLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('subtitle').textContent = LANG_SUBTITLES[lang];
  localStorage.setItem('lc_turbo_last_lang', lang);
  renderLevels();
}

// ============================================================
// CATEGORY SELECTOR
// ============================================================
function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  localStorage.setItem(storageKey('last_cat'), cat);
  renderLevels();
}

// ============================================================
// RENDER LEVELS
// ============================================================
function renderLevels() {
  levelList.style.display = 'flex';
  gameContainer.style.display = 'none';
  levelList.innerHTML = '';
  updateProgress();

  var unlocked = getUnlocked();
  var zones = {
    1: { label: 'Levels 1–3 · Present & Past' },
    4: { label: 'Levels 4–6 · Future & Conditional' },
    7: { label: 'Levels 7–8 · Complex Structures' },
    9: { label: 'Levels 9–10 · H1 Territory' },
  };

  for (var i = 1; i <= 10; i++) {
    if (zones[i]) {
      var zl = document.createElement('div');
      zl.className = 'zone-label';
      zl.textContent = zones[i].label;
      levelList.appendChild(zl);
    }
    var btn = document.createElement('button');
    var best = getBest(currentCat, i);
    var locked = i > unlocked;
    var stars = best ? '⭐'.repeat(parseInt(best)) + '☆'.repeat(3-parseInt(best)) : '';
    var zoneClass = i >= 9 ? 'h1-zone' : (i >= 4 && i <= 6) ? 'future-zone' : '';
    btn.className = 'level-btn' + (zoneClass ? ' '+zoneClass : '');
    btn.innerHTML = '<span>' + (locked ? '🔒 ' : '') + 'Level ' + i + '</span><span class="level-badge">' + (stars || (locked ? '' : '—')) + '</span>';
    btn.disabled = locked;
    (function(level) { btn.addEventListener('click', function() { startGame(level); }); })(i);
    levelList.appendChild(btn);
  }

  if (brotherUnlocked()) {
    var bb = document.createElement('button');
    bb.textContent = '🧓 The Brother is ready — enter now';
    bb.className = 'level-btn brother-btn';
    bb.addEventListener('click', function() {
      localStorage.setItem('lc_turbo_data_' + currentLang, JSON.stringify(getTurboData()));
      localStorage.setItem('lc_turbo_lang', currentLang);
      window.location.href = 'brother.html';
    });
    levelList.appendChild(bb);
  }
}

function updateProgress() {
  var stars = getTotalStars();
  var pct = Math.min(100, Math.round((stars / BROTHER_UNLOCK) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  var banner = document.getElementById('star-banner');
  if (brotherUnlocked()) {
    banner.textContent = '🎉 ' + stars + ' stars — The Brother is unlocked!';
    banner.style.background = '#e8f5ee'; banner.style.borderColor = '#2d5a27'; banner.style.color = '#1a5c38';
  } else {
    banner.textContent = '⭐ ' + stars + ' star' + (stars !== 1 ? 's' : '') + ' earned — need ' + BROTHER_UNLOCK + ' to unlock The Brother';
  }
}

// ============================================================
// START GAME
// ============================================================
function startGame(level) {
  currentLevel = level;
  localStorage.setItem(storageKey('last_level'), level);

  var pool = PHRASES[currentLang][currentCat].filter(function(p) { return p.lv === level; });
  if (pool.length < QUESTIONS_PER_LEVEL) {
    var extra = PHRASES[currentLang][currentCat].filter(function(p) { return Math.abs(p.lv - level) === 1; });
    pool = pool.concat(extra);
  }

  var splitPool = [];
  pool.forEach(function(p) { splitPhrase(p).forEach(function(part) { splitPool.push(part); }); });
  currentPhrases = shuffleArray(splitPool).slice(0, QUESTIONS_PER_LEVEL);

  levelList.style.display = 'none';
  gameContainer.style.display = 'block';
  questionsContainer.innerHTML = '';
  resultsContainer.innerHTML = '';

  currentPhrases.forEach(function(phrase, idx) {
    var promptSafe = phrase.en.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    var answerSafe = phrase.tl.replace(/"/g,'&quot;');
    var div = document.createElement('div');
    div.innerHTML =
      '<div class="prompt-row"><strong>' + phrase.en + '</strong>' +
      '<button class="speak-prompt" type="button" onclick="speakPrompt(\'' + promptSafe + '\')" title="Read aloud">🔊</button></div>' +
      '<input type="text" data-answer="' + answerSafe + '" placeholder="' + writePlaceholder() + '" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">' +
      '<button class="voice-btn-inline" type="button" data-idx="' + idx + '" onclick="startVoice(this,' + idx + ')">🎤 Speak</button>';
    var inp = div.querySelector('input');
    inp.addEventListener('paste', function(e) { e.preventDefault(); });
    inp.addEventListener('drop', function(e) { e.preventDefault(); });
    questionsContainer.appendChild(div);
  });

  startTimer();
}

function writePlaceholder() {
  return { es:'Escribe en español...', fr:'Écris en français...', de:'Schreib auf Deutsch...' }[currentLang] || 'Write here...';
}

function splitPhrase(p) {
  var joiners = [' because ',' although ',' however ',' but ',' and ',' so ',' when ',' if ',' since ',' after ',' before ',' with ',' without ',' to ',' for ',' in order '];
  var enWords = p.en.trim().split(/\s+/);
  var tlWords = p.tl.trim().split(/\s+/);
  if (enWords.length < 10 || tlWords.length < 8) return [p];
  var validSplits = [];
  joiners.forEach(function(j) {
    var pos = p.en.toLowerCase().indexOf(j);
    if (pos <= 0) return;
    var enA = p.en.substring(0, pos).trim();
    var enB = p.en.substring(pos).trim();
    if (wordCount(enA) < 5 || wordCount(enB) < 5) return;
    var ratio = enA.split(/\s+/).length / enWords.length;
    var tlSplitWord = Math.round(ratio * tlWords.length);
    tlSplitWord = Math.max(4, Math.min(tlSplitWord, tlWords.length - 4));
    var tlA = tlWords.slice(0, tlSplitWord).join(' ');
    var tlB = tlWords.slice(tlSplitWord).join(' ');
    if (wordCount(tlA) < 4 || wordCount(tlB) < 4) return;
    validSplits.push([{ en:enA, tl:tlA, lv:p.lv }, { en:enB, tl:tlB, lv:p.lv }]);
  });
  if (validSplits.length === 0) return [p];
  return validSplits[Math.floor(Math.random() * validSplits.length)];
}

function wordCount(s) { return s.trim().split(/\s+/).length; }
function shuffleArray(arr) { return arr.sort(function() { return Math.random() - 0.5; }); }

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(function() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer').textContent = 'Time: ' + elapsed + 's';
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

// ============================================================
// SUBMIT
// ============================================================
document.getElementById('submit').addEventListener('click', function() {
  stopTimer();
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var penalty = 0;
  var correct = 0;
  var total = currentPhrases.length;
  var strictCorrect = 0, lenientCorrect = 0;

  document.querySelectorAll('#questions input').forEach(function(input) {
    var userAns    = input.value.trim();
    var correctAns = input.dataset.answer;
    var strict  = normaliseStrict(userAns)  === normaliseStrict(correctAns);
    var lenient = normaliseLenient(userAns) === normaliseLenient(correctAns);
    input._strict = strict; input._lenient = lenient;
    if (lenient) lenientCorrect++;
    if (strict)  strictCorrect++;
  });

  document.querySelectorAll('#questions input').forEach(function(input) {
    if (input._lenient) {
      correct++;
      input.style.border = '2px solid #27ae60';
      input.style.background = '#f0fff4';
    } else {
      penalty += PENALTY_SECS;
      input.style.border = '2px solid #e74c3c';
      input.style.background = '#fff5f5';
    }
  });

  var totalTime = elapsed + penalty;
  var stars = 0;
  if (strictCorrect === total && totalTime <= levelUnlockTime(currentLevel)) stars = 3;
  else if (lenientCorrect === total) stars = 2;
  else if (lenientCorrect >= Math.ceil(total * 0.5)) stars = 1;

  setBest(currentCat, currentLevel, stars);
  if (stars >= 1) setUnlocked(currentLevel + 1);

  resultsContainer.innerHTML = '<h3>Finished!</h3>'
    + '<p>Correct: ' + correct + '/' + total + '</p>'
    + '<p>Time: ' + elapsed + 's + Penalty: ' + penalty + 's = <strong>' + totalTime + 's</strong></p>'
    + '<p style="font-size:1.4rem">' + '⭐'.repeat(stars) + '☆'.repeat(3-stars) + '</p>';

  if (stars < 3 && strictCorrect < total && lenientCorrect === total) {
    var accNote = document.createElement('p');
    accNote.style.cssText = 'font-size:0.82rem;color:#b45309;margin:4px 0 8px;';
    accNote.textContent = ACCENT_TIPS[currentLang];
    resultsContainer.appendChild(accNote);
  }

  resultsContainer.innerHTML += '<h4>What you missed:</h4>';

  document.querySelectorAll('#questions input').forEach(function(input) {
    if (!input._lenient) {
      var p = document.createElement('p');
      p.style.cssText = 'margin:6px 0;font-size:0.92rem;';
      var engLabel = input.closest('div').querySelector('strong').textContent;
      p.innerHTML = '<strong>' + engLabel + '</strong><br>'
        + '✅ <span style="color:#27ae60">' + input.dataset.answer + '</span><br>'
        + '❌ <span style="color:#e74c3c">' + (input.value.trim() || '(blank)') + '</span>';
      resultsContainer.appendChild(p);
    }
  });

  if (correct === total) {
    var cel = document.createElement('div');
    cel.className = 'perfect-celebration';
    cel.textContent = stars === 3 ? '🎉 PERFECT — 3 stars! 🎉' : '✅ All correct!';
    resultsContainer.prepend(cel);
    if (stars === 3) setTimeout(function() { cel.textContent = ''; }, 5000);
  }

  if (stars >= 1) {
    var uMsg = document.createElement('p');
    uMsg.className = 'unlock-msg';
    uMsg.textContent = '🔓 Level ' + (currentLevel + 1) + ' unlocked!';
    resultsContainer.appendChild(uMsg);
  }

  updateProgress();
  if (brotherUnlocked()) {
    var bMsg = document.createElement('p');
    bMsg.className = 'unlock-msg';
    bMsg.innerHTML = '🧓 The Brother is ready! <a href="brother.html" style="color:#1a5c38;font-weight:bold;" onclick="saveTurboData()">Enter →</a>';
    resultsContainer.appendChild(bMsg);
  }

  var tryBtn = document.createElement('button');
  tryBtn.textContent = 'Try Again'; tryBtn.className = 'try-again'; tryBtn.type = 'button';
  tryBtn.onclick = function() { startGame(currentLevel); };
  resultsContainer.appendChild(tryBtn);

  var backBtn = document.createElement('button');
  backBtn.textContent = '← Back to Levels'; backBtn.id = 'back-button'; backBtn.type = 'button';
  backBtn.onclick = function() { renderLevels(); };
  resultsContainer.appendChild(backBtn);
});

function saveTurboData() {
  localStorage.setItem('lc_turbo_data_' + currentLang, JSON.stringify(getTurboData()));
  localStorage.setItem('lc_turbo_lang', currentLang);
}

function levelUnlockTime(level) { return 130 - (level - 1) * 8; }

// Lenient — no accents, no punctuation
function normaliseLenient(s) {
  return String(s).toLowerCase()
    .replace(/\.\.\./g,'').replace(/[¿¡]/g,'').replace(/[,]/g,'')
    .replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íîï]/g,'i')
    .replace(/[óôö]/g,'o').replace(/[úûü]/g,'u').replace(/[ñ]/g,'n')
    .replace(/[ß]/g,'ss').replace(/[œ]/g,'oe').replace(/[æ]/g,'ae')
    .replace(/[ç]/g,'c').replace(/\s+/g,' ').trim();
}
// Strict — accents required, ¿¡ stripped
function normaliseStrict(s) {
  return String(s).toLowerCase()
    .replace(/\.\.\./g,'').replace(/[¿¡]/g,'').replace(/[,]/g,'')
    .replace(/\s+/g,' ').trim();
}

// ============================================================
// VOICE
// ============================================================
function speakPrompt(text) {
  if (!('speechSynthesis' in window)) return;
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-IE'; utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

var activeRecognition = null;
function startVoice(btn, idx) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('Voice input works best in Chrome.'); return; }
  if (activeRecognition) { activeRecognition.stop(); }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SR();
  rec.lang = VOICE_LANGS[currentLang] || 'es-ES';
  rec.continuous = false; rec.interimResults = false;
  activeRecognition = rec;
  btn.classList.add('listening'); btn.textContent = '🔴 Listening...';
  rec.onresult = function(e) {
    var inputs = document.querySelectorAll('#questions input');
    if (inputs[idx]) inputs[idx].value = e.results[0][0].transcript;
  };
  rec.onend = function() { btn.classList.remove('listening'); btn.textContent = '🎤 Speak'; activeRecognition = null; };
  rec.onerror = function() { btn.classList.remove('listening'); btn.textContent = '🎤 Speak'; activeRecognition = null; };
  rec.start();
}

// ============================================================
// INIT — restore last language
// ============================================================
(function() {
  var savedLang = localStorage.getItem('lc_turbo_last_lang');
  if (savedLang && PHRASES[savedLang]) {
    currentLang = savedLang;
    document.querySelectorAll('.lang-btn').forEach(function(b) {
      b.classList.toggle('active', b.textContent.toLowerCase().includes(LANG_NAMES[savedLang].toLowerCase()));
    });
    document.getElementById('subtitle').textContent = LANG_SUBTITLES[savedLang];
  }
  renderLevels();
})();
</script>
