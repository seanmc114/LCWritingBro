<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TURBO LC — Spanish</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background-color: #1a1a2e; }
    .container { text-align: center; width: 100%; max-width: 620px; padding: 30px; background-color: rgba(255,255,255,0.97); border-radius: 20px; margin: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); color: #333; }
    h1 { font-size: 3.6rem; color: #c0392b; margin-bottom: 4px; font-style: italic; letter-spacing: -1px; }
    .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 18px; letter-spacing: 1px; text-transform: uppercase; }

    /* Progress bar */
    .progress-wrap { margin-bottom: 18px; }
    .progress-label { font-size: 0.82rem; color: #666; margin-bottom: 5px; display: flex; justify-content: space-between; }
    .progress-track { background: #eee; border-radius: 50px; height: 10px; }
    .progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, #c0392b, #e67e22); transition: width 0.4s; }

    /* Star counter */
    .star-banner { background: #fff8e1; border: 2px solid #f39c12; border-radius: 12px; padding: 10px 16px; margin-bottom: 18px; font-size: 0.9rem; color: #7f4f00; font-weight: bold; }

    /* Category buttons */
    #cat-buttons { margin-bottom: 18px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    .cat-btn { background: #eee; color: #555; font-size: 0.82rem; padding: 7px 14px; border: none; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
    .cat-btn:hover { background: #ccc; }
    .cat-btn.active { background: #c0392b; color: white; font-weight: bold; }

    /* Level list */
    #level-list { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; }
    .level-btn { font-size: 1rem; padding: 13px 16px; background-color: #2ecc71; color: white; border-radius: 10px; border: none; cursor: pointer; width: 92%; max-width: 340px; transition: transform 0.2s, background-color 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .level-btn:hover { background-color: #27ae60; transform: scale(1.03); }
    .level-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; color: #888; }
    .level-btn.h1-zone { background-color: #8e44ad; }
    .level-btn.h1-zone:hover { background-color: #7d3c98; }
    .level-btn.future-zone { background-color: #2980b9; }
    .level-btn.future-zone:hover { background-color: #1a6fa1; }
    .brother-btn { background: linear-gradient(135deg, #2d5a27, #3d7a35) !important; font-size: 1rem !important; justify-content: center !important; }
    .brother-btn:hover { filter: brightness(1.1); }

    .level-badge { font-size: 0.72rem; background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px; }

    /* Game */
    #game { display: none; margin-top: 16px; }
    #timer { font-size: 1.35rem; color: #c0392b; margin-bottom: 14px; font-weight: bold; }
    #questions div { margin: 12px 0; font-size: 1rem; text-align: left; }
    #questions input { font-size: 1rem; padding: 8px 10px; width: 100%; margin-top: 5px; border: 2px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    #questions .prompt-row { display: flex; align-items: center; gap: 6px; }
    #questions .speak-prompt { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0 2px; }

    #submit { font-size: 1.3rem; padding: 13px 26px; background-color: #e67e22; color: white; border-radius: 12px; cursor: pointer; margin: 14px 4px 4px; transition: transform 0.2s, background-color 0.2s; border: none; }
    #submit:hover { background-color: #ca6f1e; transform: scale(1.04); }

    #results { margin-top: 16px; font-size: 1rem; text-align: left; }
    .try-again, #back-button { font-size: 1.1rem; padding: 11px 22px; background-color: #e67e22; color: white; border-radius: 10px; cursor: pointer; margin: 7px 4px; border: none; transition: transform 0.2s; }
    .try-again:hover, #back-button:hover { background-color: #ca6f1e; transform: scale(1.04); }
    .perfect-celebration { font-size: 1.8rem; color: gold; margin-bottom: 12px; }
    .unlock-msg { color: #2d5a27; font-weight: bold; font-size: 1rem; margin: 8px 0; }

    /* Voice btn */
    .voice-btn-inline { background: #eee; border: 2px solid #ccc; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.85rem; margin-top: 5px; transition: all 0.2s; }
    .voice-btn-inline.listening { background: #fee; border-color: #c0392b; }
    .voice-btn-inline:hover { background: #ddd; }

    /* Zone labels */
    .zone-label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 4px; font-weight: bold; }

    footer { margin-top: 28px; font-size: 0.72rem; color: #aaa; border-top: 1px solid #eee; padding-top: 12px; }
  </style>
</head>
<body>
<div class="container">
  <h1>TURBO LC</h1>
  <p class="subtitle">Leaving Cert Spanish · Section C · Written Production</p>

  <!-- Progress -->
  <div class="progress-wrap">

  <!-- Category -->
  <div id="cat-buttons">

    <button class="cat-btn" onclick="selectCat('note',this)">✉️ Note / Email</button>
    <button class="cat-btn" onclick="selectCat('opinion',this)">🗣️ Opinion</button>
    <button class="cat-btn" onclick="selectCat('formal',this)">📋 Formal Letter</button>

  <!-- Level list -->
  <div id="level-list"></div>

  <!-- Game -->
  <div id="game">

    <div id="questions"></div>
    <button id="submit">Check Answers</button>
    <div id="results"></div>
  </div>

  <footer>© 2026 Synge Street Games: Imagination and Perseverance</footer>
</div>

// ============================================================
// GAME STATE
// ============================================================
const BROTHER_UNLOCK    = 5;   // Very low — The Brother does the rest
const PENALTY_SECS      = 20;
const QUESTIONS_PER_LEVEL = 6;
const STORAGE_PREFIX    = 'lc_turbo_';

let currentCat    = 'dialogue';
let currentLevel  = 1;
let currentPhrases= [];
let startTime, timerInterval;

const levelList          = document.getElementById('level-list');
const gameContainer      = document.getElementById('game');
const questionsContainer = document.getElementById('questions');
const resultsContainer   = document.getElementById('results');

// ============================================================
// LOCALSTORAGE
// ============================================================
function getUnlocked()            { return parseInt(localStorage.getItem(STORAGE_PREFIX+'unlocked') || '1'); }
function setUnlocked(level)       { if (level > getUnlocked()) localStorage.setItem(STORAGE_PREFIX+'unlocked', level); }
function getBest(cat, level)      { return localStorage.getItem(STORAGE_PREFIX+'best_'+cat+'_'+level); }
function setBest(cat, level, stars) {
  const prev = parseInt(getBest(cat, level) || '0');
  if (stars > prev) localStorage.setItem(STORAGE_PREFIX+'best_'+cat+'_'+level, stars);
}
function getTotalStars() {
  let total = 0;
  ['dialogue','diary','note','opinion','formal'].forEach(function(c) {
    for (var v = 1; v <= 10; v++) total += parseInt(getBest(c, v) || '0');
  });
  return total;
}
function brotherUnlocked() { return getTotalStars() >= BROTHER_UNLOCK; }

// Get detailed star shape for Brother coaching
function getTurboData() {
  const cats = ['dialogue','diary','note','opinion','formal'];
  const catLabels = { dialogue:'Dialogue', diary:'Diary', note:'Note/Email', opinion:'Opinion Piece', formal:'Formal Letter' };
  const data = {};
  cats.forEach(function(cat) {
    data[cat] = { label: catLabels[cat], levels: {} };
    for (var lv = 1; lv <= 10; lv++) {
      const s = getBest(cat, lv);
      if (s) data[cat].levels[lv] = parseInt(s);
    }
  });
  return data;
}

// ============================================================
// CATEGORY SELECTOR
// ============================================================
function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  localStorage.setItem(STORAGE_PREFIX+'last_cat', cat);
  renderLevels();
}

// ============================================================
// RENDER LEVELS
// ============================================================
function renderLevels() {
  levelList.style.display = 'flex';
  gameContainer.style.display = 'none';
  levelList.innerHTML = '';
  updateProgress();

  var unlocked = getUnlocked();

  // Zone labels
  var zones = {
    1: { label: 'Levels 1–3 · Present & Past', class: '' },
    4: { label: 'Levels 4–6 · Future & Conditional', class: 'future-zone' },
    7: { label: 'Levels 7–8 · Subjunctive & Gustar', class: '' },
    9: { label: 'Levels 9–10 · H1 Territory', class: 'h1-zone' },
  };

  for (var i = 1; i <= 10; i++) {
    // Insert zone label
    if (zones[i]) {
      var zl = document.createElement('div');
      zl.className = 'zone-label';
      zl.textContent = zones[i].label;
      levelList.appendChild(zl);
    }

    var btn = document.createElement('button');
    var best = getBest(currentCat, i);
    var locked = i > unlocked;
    var stars = best ? '⭐'.repeat(parseInt(best)) + '☆'.repeat(3-parseInt(best)) : '';
    var zoneClass = i >= 9 ? 'h1-zone' : i >= 4 && i <= 6 ? 'future-zone' : '';

    btn.className = 'level-btn' + (zoneClass ? ' '+zoneClass : '');

    var leftText = (locked ? '🔒 ' : '') + 'Level ' + i;
    var rightText = stars ? stars : (locked ? '' : '—');

    btn.innerHTML = '<span>' + leftText + '</span><span class="level-badge">' + rightText + '</span>';
    btn.disabled = locked;

    (function(level) {
      btn.addEventListener('click', function() { startGame(level); });
    })(i);
    levelList.appendChild(btn);
  }

  // Brother button
  if (brotherUnlocked()) {
    var bb = document.createElement('button');
    bb.textContent = '🧓 The Brother is ready — enter now';
    bb.className = 'level-btn brother-btn';
    bb.addEventListener('click', function() {
      localStorage.setItem('lc_turbo_data', JSON.stringify(getTurboData()));
      window.location.href = 'brother.html';
    });
    levelList.appendChild(bb);
  }
}

function updateProgress() {
  var stars = getTotalStars();
  var pct = Math.min(100, Math.round((stars / BROTHER_UNLOCK) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  var banner = document.getElementById('star-banner');
  if (brotherUnlocked()) {
    banner.textContent = '🎉 ' + stars + ' stars — The Brother is unlocked!';
    banner.style.background = '#e8f5ee';
    banner.style.borderColor = '#2d5a27';
    banner.style.color = '#1a5c38';
  } else {
    banner.textContent = '⭐ ' + stars + ' star' + (stars !== 1 ? 's' : '') + ' earned — need ' + BROTHER_UNLOCK + ' to unlock The Brother';
  }
}

// ============================================================
// START GAME
// ============================================================
function startGame(level) {
  currentLevel = level;
  localStorage.setItem(STORAGE_PREFIX+'last_level', level);

  // Get phrases for this level from current category
  var pool = PHRASES[currentCat].filter(function(p) { return p.lv === level; });

  // If not enough in this exact level, pull from adjacent
  if (pool.length < QUESTIONS_PER_LEVEL) {
    var extra = PHRASES[currentCat].filter(function(p) { return Math.abs(p.lv - level) === 1; });
    pool = pool.concat(extra);
  }

  currentPhrases = shuffleArray(pool.slice()).slice(0, QUESTIONS_PER_LEVEL);

  levelList.style.display = 'none';
  gameContainer.style.display = 'block';
  questionsContainer.innerHTML = '';
  resultsContainer.innerHTML = '';

  currentPhrases.forEach(function(phrase, idx) {
    var div = document.createElement('div');
    div.innerHTML = `
      <div class="prompt-row">
        <strong>${phrase.en}</strong>
        <button class="speak-prompt" onclick="speakPrompt('${phrase.en.replace(/'/g,"\\'")}')" title="Read aloud">🔊</button>
      </div>
      <input type="text" data-answer="${phrase.tl.replace(/"/g,'&quot;')}" placeholder="Escribe en español..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="voice-btn-inline" data-idx="${idx}" onclick="startVoice(this, ${idx})">🎤 Speak</button>
    `;
    // Disable paste — no gaming the feedback
    var inp = div.querySelector('input');
    inp.addEventListener('paste', function(e) { e.preventDefault(); });
    inp.addEventListener('drop', function(e) { e.preventDefault(); });
    questionsContainer.appendChild(div);
  });

  startTimer();
}

function shuffleArray(arr) {
  return arr.sort(function() { return Math.random() - 0.5; });
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(function() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer').textContent = 'Time: ' + elapsed + 's';
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

// ============================================================
// SUBMIT
// ============================================================
document.getElementById('submit').addEventListener('click', function() {
  stopTimer();
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var penalty = 0;
  var correct = 0;
  var total = currentPhrases.length;

  // First pass: check all answers with strict matching (for 3 stars)
  var strictCorrect = 0;
  var lenientCorrect = 0;

  document.querySelectorAll('#questions input').forEach(function(input) {
    var userAns    = input.value.trim();
    var correctAns = input.dataset.answer;
    var strict  = normaliseStrict(userAns) === normaliseStrict(correctAns);
    var lenient = normaliseLenient(userAns) === normaliseLenient(correctAns);
    input._strict  = strict;
    input._lenient = lenient;
    if (lenient) lenientCorrect++;
    if (strict)  strictCorrect++;
  });

  // Determine star level first so we know which standard to apply for border colours
  var totalTimeFull = elapsed; // no penalty yet — calculate below

  // For scoring: use lenient correct for 1/2 stars, strict for 3
  var tentativeStars = 0;
  if (strictCorrect === total) tentativeStars = 3;      // all strict — could be 2 or 3
  else if (lenientCorrect === total) tentativeStars = 2; // all lenient, not all strict
  else if (lenientCorrect >= Math.ceil(total * 0.5)) tentativeStars = 1;
  else tentativeStars = 0;

  // Now apply borders and penalties based on lenient correctness
  document.querySelectorAll('#questions input').forEach(function(input) {
    if (input._lenient) {
      input.style.border = '2px solid #27ae60';
      input.style.background = '#f0fff4';
      correct++;
    } else {
      penalty += PENALTY_SECS;
      input.style.border = '2px solid #e74c3c';
      input.style.background = '#fff5f5';
    }
  });

  var totalTime = elapsed + penalty;

  // Final star calculation: 3 stars needs strict + fast, otherwise use lenient
  var stars = 0;
  if (strictCorrect === total && totalTime <= levelUnlockTime(currentLevel)) stars = 3;
  else if (lenientCorrect === total) stars = 2;
  else if (lenientCorrect >= Math.ceil(total * 0.5)) stars = 1;

  setBest(currentCat, currentLevel, stars);
  if (stars >= 1) setUnlocked(currentLevel + 1);

  // Results
  resultsContainer.innerHTML = '<h3>Finished!</h3>'
    + '<p>Correct: ' + correct + '/' + total + '</p>'
    + '<p>Time: ' + elapsed + 's + Penalty: ' + penalty + 's = <strong>' + totalTime + 's</strong></p>'
    + '<p style="font-size:1.4rem">' + '⭐'.repeat(stars) + '☆'.repeat(3-stars) + '</p>';

  if (stars < 3 && strictCorrect < total && lenientCorrect === total) {
    var accNote = document.createElement('p');
    accNote.style.cssText = 'font-size:0.82rem;color:#b45309;margin:4px 0 8px;';
    accNote.textContent = '💡 For 3 stars: include accents (á é í ó ú ñ) and exact punctuation.';
    resultsContainer.appendChild(accNote);
  }

  resultsContainer.innerHTML += '<h4>What you missed:</h4>';

  document.querySelectorAll('#questions input').forEach(function(input) {
    var userAns    = input.value.trim();
    var correctAns = input.dataset.answer;
    if (!input._lenient) {
      var p = document.createElement('p');
      p.style.cssText = 'margin:6px 0; font-size:0.92rem;';
      var engLabel = input.closest('div').querySelector('strong').textContent;
      p.innerHTML = '<strong>' + engLabel + '</strong><br>'
        + '✅ <span style="color:#27ae60">' + correctAns + '</span><br>'
        + '❌ <span style="color:#e74c3c">' + (userAns || '(blank)') + '</span>';
      resultsContainer.appendChild(p);
    }
  });

  if (correct === total) {
    var cel = document.createElement('div');
    cel.className = 'perfect-celebration';
    cel.textContent = stars === 3 ? '🎉 PERFECT — 3 stars! 🎉' : '✅ All correct!';
    resultsContainer.prepend(cel);
    if (stars === 3) setTimeout(function() { cel.textContent = ''; }, 5000);
  }

  if (stars >= 1) {
    var uMsg = document.createElement('p');
    uMsg.className = 'unlock-msg';
    uMsg.textContent = '🔓 Level ' + (currentLevel + 1) + ' unlocked!';
    resultsContainer.appendChild(uMsg);
  }

  updateProgress();
  if (brotherUnlocked()) {
    var bMsg = document.createElement('p');
    bMsg.className = 'unlock-msg';
    bMsg.innerHTML = '🧓 You\'ve earned The Brother! <a href="brother.html" style="color:#1a5c38;font-weight:bold;" onclick="saveTurboData()">Enter →</a>';
    resultsContainer.appendChild(bMsg);
  }

  var tryBtn = document.createElement('button');
  tryBtn.textContent = 'Try Again';
  tryBtn.className = 'try-again';
  tryBtn.onclick = function() { startGame(currentLevel); };
  resultsContainer.appendChild(tryBtn);

  var backBtn = document.createElement('button');
  backBtn.textContent = '← Back to Levels';
  backBtn.id = 'back-button';
  backBtn.onclick = function() { renderLevels(); };
  resultsContainer.appendChild(backBtn);
});

function saveTurboData() {
  localStorage.setItem('lc_turbo_data', JSON.stringify(getTurboData()));
}

function levelUnlockTime(level) {
  return 130 - (level - 1) * 8;
}

// Lenient: no accents, no ¿¡, no commas, case-insensitive — for 1 and 2 stars
function normaliseLenient(s) {
  return String(s).toLowerCase()
    .replace(/\.\.\./g,'')
    .replace(/[¿¡]/g,'')
    .replace(/[,]/g,'')
    .replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e')
    .replace(/[íîï]/g,'i').replace(/[óôö]/g,'o')
    .replace(/[úûü]/g,'u').replace(/[ü]/g,'u')
    .replace(/[ñ]/g,'n')
    .replace(/\s+/g,' ').trim();
}

// Strict: accents required, ¿¡ stripped (still can't type them), commas stripped, case-insensitive — for 3 stars
function normaliseStrict(s) {
  return String(s).toLowerCase()
    .replace(/\.\.\./g,'')
    .replace(/[¿¡]/g,'')
    .replace(/[,]/g,'')
    .replace(/\s+/g,' ').trim();
}

// Keep old normalise as alias for lenient (used nowhere else now)
function normalise(s) { return normaliseLenient(s); }

// ============================================================
// VOICE — read aloud + speech input
// ============================================================
function speakPrompt(text) {
  if (!('speechSynthesis' in window)) return;
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-IE';
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

var activeRecognition = null;

function startVoice(btn, idx) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input works best in Chrome.');
    return;
  }
  if (activeRecognition) { activeRecognition.stop(); }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SR();
  rec.lang = 'es-ES';
  rec.continuous = false;
  rec.interimResults = false;
  activeRecognition = rec;

  btn.classList.add('listening');
  btn.textContent = '🔴 Listening...';

  rec.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var inputs = document.querySelectorAll('#questions input');
    if (inputs[idx]) inputs[idx].value = transcript;
  };
  rec.onend = function() {
    btn.classList.remove('listening');
    btn.textContent = '🎤 Speak';
    activeRecognition = null;
  };
  rec.onerror = function() {
    btn.classList.remove('listening');
    btn.textContent = '🎤 Speak';
    activeRecognition = null;
  };
  rec.start();
}

// ============================================================
// INIT
// ============================================================
renderLevels();
</script>
